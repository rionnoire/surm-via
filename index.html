<!DOCTYPE html>
<html>
<head>
  <title>Camera RGB Capture</title>
  <style>
    video, canvas { margin: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>Camera RGB Capture</h2>

  <video id="v1" autoplay></video>
  <canvas id="c1" width="320" height="240"></canvas>
  <canvas id="c2" width="40" height="40"></canvas>
  <div>
    RGB: <span id="s1"></span>
  </div>

  <script>
    let player, c, g, g2, s1;

    async function start() {
      player = document.getElementById("v1");
      c = document.getElementById("c1");
      g = c.getContext("2d");
      g2 = document.getElementById("c2").getContext("2d");
      s1 = document.getElementById("s1");

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
        player.srcObject = stream;
        player.play();

        setInterval(capture, 500); // capture every 0.5s
      } catch (err) {
        console.error("Camera error:", err);
        alert("Camera failed: " + err.name + " – " + err.message);
      }
    }

    function capture() {
      if (!player || player.readyState < 2) return;

      // Draw video frame to canvas
      g.drawImage(player, 0, 0, c.width, c.height);
      g.strokeRect(98, 98, 44, 44);

      // Extract 40x40 pixels from center
      const d = g.getImageData(100, 100, 40, 40);
      g2.putImageData(d, 0, 0);

      // Show first pixel RGBA in span
      const [r, gValue, b, a] = d.data;
      s1.textContent = `R:${r} G:${gValue} B:${b} A:${a}`;
    }

    window.onload = start;
  </script>
</body>
</html>
